name: Build and deploy Node.js app to Azure Web App - gamedash-web-anas

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/main_gamedash-web-anas.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://gamedash-api-anas-dmh6dafyeaemfjhj.italynorth-01.azurewebsites.net
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package/dist deploy-package/scripts
          cp -r frontend/dist/. deploy-package/dist/
          cp frontend/scripts/start-azure.mjs deploy-package/scripts/
          cat > deploy-package/package.json << 'EOF'
          {
            "name": "gamedash-web",
            "private": true,
            "type": "module",
            "scripts": {
              "start": "node scripts/start-azure.mjs"
            },
            "dependencies": {
              "serve": "^14.2.4"
            }
          }
          EOF

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-package/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0CFADCCAE69C4661AD3D59ACFEF5BFB6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_383DAEAA56BE4385B6DAF7EB4749E2D7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_35D7C7F4CA9D497E881AF114AA133DA6 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: gamedash-web-anas
          slot-name: Production
          package: deploy-package
